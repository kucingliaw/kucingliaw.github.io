<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="dist/style.css" />
        <title>Maulana Syawal</title>
    </head>
    <body>
        <!-- Navbar -->
        <nav class="navbar | flex flex-ai-center">
            <div class="container flex flex-jc-sb flex-ai-center">
                <a href="#" class="navbar__brand">Wawal</a>
                <button class="navbar__btn">
                    <span></span><span></span><span></span>
                </button>
                <ul class="navbar__links | flex has-fade fade-out">
                    <li><a href="#main" class="navbar__item">Home</a></li>
                    <li><a href="#about" class="navbar__item">About</a></li>
                    <li><a href="#contact" class="navbar__item">Contact</a></li>
                </ul>
            </div>
        </nav>

        <!-- Main -->
        <section class="main" id="main">
            <div class="container">
                <div class="main__wrapper | flex flex-jc-sb flex-ai-center">
                    <div class="main__data">
                        <h1 class="main__title">I'm Wawal</h1>
                        <p class="main__subtitle">
                            Freelance Front End Developer based in Jakarta,
                            Indonesia. If you are looking for Front End
                            Developer to be a part of your team, Let's shake
                            hands with me.
                        </p>
                        <a href="#contact" class="main__btn | btn btn-primary"
                            >Hire Me</a
                        >
                    </div>
                    <div class="main__img">
                        <img src="app/img/main.svg" alt="main" />
                    </div>
                </div>
            </div>
        </section>
        <section class="about" id="about"></section>
        <section class="contact" id="contact"></section>
        <script src="app/js/script.js"></script>
    </body>
</html>
